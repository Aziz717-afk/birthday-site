<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family: Arial;
  overflow:hidden;
  text-align:center;
}

/* COUNTDOWN */
#count {
  font-size:80px;
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* TEXT */
.text {
  display:none;
  font-size:50px;
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* ENVELOPE */
#envelope {
  display:none;
  font-size:80px;
  cursor:pointer;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* SLIDER */
#slider {
  display:none;
}

.slide {
  display:none;
}

.slide img {
  width:80%;
  border-radius:15px;
}

/* HEART */
#heart {
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.heart-img {
  position:absolute;
  width:80px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="count">3</div>

<div id="happy" class="text">HAPPY</div>
<div id="birthday" class="text">BIRTHDAY</div>

<div id="envelope">💌</div>

<div id="slider">
  <div class="slide"><img src="https://ibb.co/D0H2qmL">
  <div class="slide"><img src="https://via.placeholder.com/300"></div>
  <div class="slide"><img src="https://via.placeholder.com/300"></div>
</div>

<div id="heart"></div>

<script>
// COUNTDOWN
let num = 3;
let count = document.getElementById("count");

let interval = setInterval(()=>{
  num--;
  if(num===0){
    clearInterval(interval);
    count.style.display="none";
    showText();
  } else {
    count.innerText = num;
  }
},1000);

// TEXT
function showText(){
  let h = document.getElementById("happy");
  let b = document.getElementById("birthday");

  h.style.display="block";

  setTimeout(()=>{
    h.style.display="none";
    b.style.display="block";
  },1500);

  setTimeout(()=>{
    b.style.display="none";
    showEnvelope();
  },3000);
}

// ENVELOPE
function showEnvelope(){
  let e = document.getElementById("envelope");
  e.style.display="block";

  e.onclick = ()=>{
    e.style.display="none";
    startSlider();
  }
}

// SLIDER
function startSlider(){
  let slides = document.querySelectorAll(".slide");
  let index = 0;
  document.getElementById("slider").style.display="block";

  function showSlide(){
    slides.forEach(s=>s.style.display="none");
    slides[index].style.display="block";

    index++;

    if(index < slides.length){
      setTimeout(showSlide,2000);
    } else {
      setTimeout(showHeart,2000);
    }
  }

  showSlide();
}

// HEART
function showHeart(){
  document.getElementById("slider").style.display="none";
  let heart = document.getElementById("heart");
  heart.style.display="block";

  let positions = [
    [0,40],[20,20],[40,10],[60,20],[80,40],
    [20,60],[40,80],[60,60]
  ];

  positions.forEach((pos,i)=>{
    let img = document.createElement("img");
    img.src = "https://via.placeholder.com/80";
    img.className="heart-img";
    img.style.left = pos[0]+"%";
    img.style.top = pos[1]+"%";
    heart.appendChild(img);
  });
}
</script>

</body>
</html>
